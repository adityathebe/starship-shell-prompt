"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$git_stash\
$time\
$cmd_duration\
$character"""

palette = 'one_light'

[directory]
style = "fg:blue"
format = "[ $path ]($style)"
truncation_length = 7
truncate_to_repo = false

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
format = '[$symbol $branch](fg:green)'

[git_state]
format = '[ $state( $progress_current/$progress_total)](fg:red)'

[git_status]
style = ""
stashed = '[ 👝$count](fg:rosewater)'
staged = '[ +($count)](fg:mauve)'
modified = '[ !($count)](fg:yellow)'
deleted = '[ -($count)](fg:red)'
ahead = '[ ⇡${count}](fg:green)'
behind = '[ ⇣${count}](fg:green)'
diverged = '[ ⇡${ahead_count}⇣${behind_count}](fg:green)'
untracked = "[ ?${count}](fg:lavender)"
format = '[[($all_status$ahead_behind )](fg:crust )]($style)'
conflicted = '🏳'

# don't need this info (override the default)
up_to_date = ''
renamed = ''

[time]
disabled = false
time_format = "%R"
format = '[[  $time ](fg:white)]($style)'

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
min_time = 2000           # Shortest duration to show time for (in milliseconds).
show_milliseconds = false
format = "$duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 1000 # milliseconds

